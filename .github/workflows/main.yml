name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew update
          brew uninstall --ignore-dependencies lua 2>/dev/null || true
          brew install cmake libgit2 lua@5.4 qt pkgconfig vulkan-headers swig
          brew link --force --overwrite lua@5.4

      - name: Build
        run: |
          LUA_PREFIX=$(brew --prefix lua@5.4)
          QT_PREFIX=$(brew --prefix qt)
          cp -r "$LUA_PREFIX/include/lua5.4/." include/
          LUA_LIB=$(ls "$LUA_PREFIX/lib/liblua"*.dylib | head -1)
          echo "=== Using Lua lib : $LUA_LIB ==="
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_PREFIX" \
            -DLUA_INCLUDE_DIR="$(pwd)/../include" \
            -DLUA_LIBRARY="$LUA_LIB" \
            -DCMAKE_EXE_LINKER_FLAGS="-L$LUA_PREFIX/lib -llua5.4"
          make -j$(sysctl -n hw.logicalcpu)

      - name: Package
        run: |
          QT_BIN=$(brew --prefix qt)/bin
          APP_PATH="build/FreeKill.app"
          mkdir -p "$APP_PATH/Contents/MacOS"

          cp build/FreeKill "$APP_PATH/Contents/MacOS/FreeKill.bin"

          # C 启动器：用 base64 写入，避免 YAML 特殊字符冲突
          echo '' | base64 --decode > /tmp/launcher.c
          clang -o "$APP_PATH/Contents/MacOS/FreeKill" /tmp/launcher.c

          # Info.plist
          echo '' | base64 --decode > "$APP_PATH/Contents/Info.plist"

          $QT_BIN/macdeployqt "$APP_PATH" -qmldir=. || true

          for dir in Fk audio fonts image lang lua packages; do
            [ -d "$dir" ] && cp -r "$dir" "$APP_PATH/Contents/MacOS/" || true
          done

          codesign --force --deep --sign - "$APP_PATH"

          brew install create-dmg || true
          create-dmg \
            --volname "FreeKill" \
            --window-size 600 400 \
            --app-drop-link 450 180 \
            "FreeKill-macOS.dmg" \
            "$APP_PATH" || \
          (cd build && zip -r ../FreeKill-macOS.zip FreeKill.app)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeKill-macOS
          path: |
            FreeKill-macOS.dmg
            FreeKill-macOS.zip
          if-no-files-found: warn
          retention-days: 30
