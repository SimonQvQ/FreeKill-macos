name: macOS Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击运行

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # 如果项目有子模块，自动拉取

    - name: Set up Homebrew
      uses: Homebrew/actions/setup-homebrew@master

    - name: Install dependencies
      run: |
        brew install cmake libgit2 lua qt pkgconfig vulkan-headers swig
        # 将 Qt 的路径加入环境变量，以便 cmake 能找到它
        echo "CMAKE_PREFIX_PATH=$(brew --prefix qt)" >> $GITHUB_ENV

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_PREFIX_PATH=${{ env.CMAKE_PREFIX_PATH }}

    - name: Build
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu)

    - name: Upload Artifact
      uses: actions/artifacts@v4
      with:
        name: FreeKill-macOS
        path: |
          build/FreeKill
          # 如果编译生成了 .app 或其他打包文件，可以在下方继续添加路径
