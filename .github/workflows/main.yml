name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 安装依赖
      # 重点：brew 默认的 lua 现在是 5.5，项目需要 5.4
      # 用 brew link --force 把 5.4 覆盖到默认路径
      - name: Install dependencies
        run: |
          brew update
          brew uninstall --ignore-dependencies lua 2>/dev/null || true
          brew install cmake libgit2 lua@5.4 qt pkgconfig vulkan-headers swig
          brew link --force --overwrite lua@5.4

      # cmake + make 在同一个 step，直接用 shell 变量，避免跨 step 传参失效
      - name: Build
        run: |
          LUA_PREFIX=$(brew --prefix lua@5.4)
          QT_PREFIX=$(brew --prefix qt)

          # README 要求：把 lua5.4 头文件复制到项目 include/ 目录
          cp -r "$LUA_PREFIX/include/lua5.4/." include/

          # 找到真实 .dylib 文件名
          LUA_LIB=$(ls "$LUA_PREFIX/lib/liblua"*.dylib | head -1)
          echo "=== Using Lua lib : $LUA_LIB ==="

          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_PREFIX" \
            -DLUA_INCLUDE_DIR="$(pwd)/../include" \
            -DLUA_LIBRARY="$LUA_LIB" \
            -DCMAKE_EXE_LINKER_FLAGS="-L$LUA_PREFIX/lib -llua5.4"
          make -j$(sysctl -n hw.logicalcpu)

      # 打包 .app
      - name: Package
        run: |
          QT_BIN=$(brew --prefix qt)/bin

          # 固定使用手动构建的 .app 结构，确保启动脚本正确
          APP_PATH="build/FreeKill.app"
          mkdir -p "$APP_PATH/Contents/MacOS"

          # 真正的二进制重命名为 FreeKill.bin
          cp build/FreeKill "$APP_PATH/Contents/MacOS/FreeKill.bin"

          # 编译一个 C 启动器替代 shell 脚本
          # shell 脚本作为 CFBundleExecutable 会被 macOS 用 Terminal 打开
          # 纯二进制启动器则能正常双击运行
          cat > /tmp/launcher.c << 'CSRC'
#include <unistd.h>
#include <libgen.h>
#include <string.h>
#include <mach-o/dyld.h>

int main(int argc, char *argv[]) {
    char path[4096];
    uint32_t size = sizeof(path);
    if (_NSGetExecutablePath(path, &size) != 0) return 1;

    // cd 到可执行文件所在目录（Contents/MacOS/）
    char dir[4096];
    strncpy(dir, path, sizeof(dir));
    chdir(dirname(dir));

    // 重新取一次 dirname（dirname 会修改参数）
    strncpy(dir, path, sizeof(dir));
    char real[4096];
    snprintf(real, sizeof(real), "%s/FreeKill.bin", dirname(dir));

    execv(real, argv);
    return 1;
}
CSRC
          clang -o "$APP_PATH/Contents/MacOS/FreeKill" /tmp/launcher.c
          chmod +x "$APP_PATH/Contents/MacOS/FreeKill"

          cat > "$APP_PATH/Contents/Info.plist" << 'PLIST'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
  "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>CFBundleExecutable</key><string>FreeKill</string>
  <key>CFBundleIdentifier</key><string>com.qsgs-fans.freekill</string>
  <key>CFBundleName</key><string>FreeKill</string>
  <key>CFBundlePackageType</key><string>APPL</string>
  <key>NSHighResolutionCapable</key><true/>
</dict>
</plist>
PLIST

          $QT_BIN/macdeployqt "$APP_PATH" -qmldir=. || true

          for dir in Fk audio fonts image lang lua packages; do
            [ -d "$dir" ] && cp -r "$dir" "$APP_PATH/Contents/MacOS/" || true
          done

          # ad-hoc 签名：不需要 Apple 开发者证书，让 macOS 能正常加载所有 dylib
          # --force: 覆盖已有签名  --deep: 递归签名内部所有 dylib/framework  --sign -: ad-hoc
          codesign --force --deep --sign - "$APP_PATH"

          brew install create-dmg || true
          create-dmg \
            --volname "FreeKill" \
            --window-size 600 400 \
            --app-drop-link 450 180 \
            "FreeKill-macOS.dmg" \
            "$APP_PATH" || \
          (cd build && zip -r ../FreeKill-macOS.zip FreeKill.app)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeKill-macOS
          path: |
            FreeKill-macOS.dmg
            FreeKill-macOS.zip
          if-no-files-found: warn
          retention-days: 30
