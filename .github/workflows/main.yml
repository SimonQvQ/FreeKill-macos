name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 安装依赖
      # 重点：brew 默认的 lua 现在是 5.5，项目需要 5.4
      # 用 brew link --force 把 5.4 覆盖到默认路径
      - name: Install dependencies
        run: |
          brew update
          brew uninstall --ignore-dependencies lua 2>/dev/null || true
          brew install cmake libgit2 lua@5.4 qt pkgconfig vulkan-headers swig
          brew link --force --overwrite lua@5.4

      # cmake + make 在同一个 step，直接用 shell 变量，避免跨 step 传参失效
      - name: Build
        run: |
          LUA_PREFIX=$(brew --prefix lua@5.4)
          QT_PREFIX=$(brew --prefix qt)

          echo "=== Lua prefix : $LUA_PREFIX ==="
          echo "=== Qt  prefix : $QT_PREFIX ==="
          ls "$LUA_PREFIX/lib/" | grep lua
          ls "$LUA_PREFIX/include/"

          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_PREFIX" \
            -DLUA_INCLUDE_DIR="$LUA_PREFIX/include/lua5.4" \
            -DLUA_LIBRARY="$LUA_PREFIX/lib/liblua5.4.dylib"
          make -j$(sysctl -n hw.logicalcpu)

      # 打包 .app
      - name: Package
        run: |
          QT_BIN=$(brew --prefix qt)/bin

          if [ -d "build/FreeKill.app" ]; then
            APP_PATH="build/FreeKill.app"
          else
            mkdir -p build/FreeKill.app/Contents/MacOS
            cp build/FreeKill build/FreeKill.app/Contents/MacOS/FreeKill
            cat > build/FreeKill.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>FreeKill</string>
            <key>CFBundleIdentifier</key><string>com.qsgs-fans.freekill</string>
            <key>CFBundleName</key><string>FreeKill</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          EOF
            APP_PATH="build/FreeKill.app"
          fi

          $QT_BIN/macdeployqt "$APP_PATH" -qmldir=. || true

          for dir in Fk audio fonts image lang lua packages; do
            [ -d "$dir" ] && cp -r "$dir" "$APP_PATH/Contents/MacOS/" || true
          done

          brew install create-dmg || true
          create-dmg \
            --volname "FreeKill" \
            --window-size 600 400 \
            --app-drop-link 450 180 \
            "FreeKill-macOS.dmg" \
            "$APP_PATH" || \
          (cd build && zip -r ../FreeKill-macOS.zip FreeKill.app)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeKill-macOS
          path: |
            FreeKill-macOS.dmg
            FreeKill-macOS.zip
          if-no-files-found: warn
          retention-days: 30
